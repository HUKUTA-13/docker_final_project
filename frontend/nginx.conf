server {
    listen 80;
    # Внутри контейнера server_name обычно не критичен, но оставим для порядка
    server_name localhost;

    # Путь к статике внутри образа nginx:alpine
    root /usr/share/nginx/html;
    index index.html;

    # Отдача фронтенда (React/Vue SPA роутинг)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси для бекенда
    location /api/ {
        # 'backend' — это имя сервиса из вашего docker-compose.yml
        proxy_pass http://backend:3001; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Логи выводим в stdout/stderr (стандарт Docker), чтобы их видел 'docker logs'
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
